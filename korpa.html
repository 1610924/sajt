<!doctype html>
<html lang="sr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AVENIR - Korpa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: white;
            margin: 0;
            font-family: helvetica, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background-color: white !important;
            height: 120px;
        }

        .offcanvas {
            width: 350px !important;
            background-color: rgba(242, 242, 242, 0.9) !important;
            color: black;
        }

        .pretraga-okvir {
            padding: 20px;
        }

        .korpa-naslov {
            font-size: 28px;
            color: #777;
            margin: 20px 0;
        }

        .proizvod-korpa-slika {
            width: 100%;
            max-width: 250px;
            height: auto;
        }

        .info-korpa h5 {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .cena-korpa {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .kolicina-kontrola {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-kolicina {
            background-color: #eee;
            border: none;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .kolicina-broj {
            background-color: #eee;
            padding: 3px 15px;
        }


        .placanje-sekcija {
            margin-top: auto;
            text-align: right;
            padding: 50px 0;
            background: linear-gradient(to bottom, white, #e8d1cf);
        }

        .ukupno-tekst {
            font-size: 18px;
            margin-bottom: 15px;
            margin-right: 50px;
        }


        .btn-placanje {
            background-color: #f2d7d5; 
            color: black;
            border: none;
            padding: 12px 80px;
            border-radius: 25px;
            text-decoration: none;
            display: inline-block;
            font-weight: normal;
            margin-right: 50px;
        }
    </style>
</head>
<body>

    <nav class="navbar sticky-top border-bottom">
        <div class="container-fluid">
            <button class="btn btn-outline-dark" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasScrolling">
                meni
            </button>
            <a href="index.html" class="navbar-brand mx-auto">
                <img src="avenir.PNG" alt="Logo" height="100">
            </a>
            <div class="d-flex">
                <img src="omilj.png" width="30" class="me-2">
                <img src="korpica.png" width="30" class="me-2">
                <img src="user.png" width="30">
            </div>
        </div>
    </nav>

    <div class="offcanvas offcanvas-start" data-bs-scroll="true" data-bs-backdrop="false" id="offcanvasScrolling">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title">MENI</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <h3>Žene</h3>
            <h3 class="text-secondary">Muškarci</h3>
            <br>
            <p><strong>Odeća</strong></p>
            <ul class="list-unstyled ms-3 text-secondary">
                <li>Haljine i kombinezoni</li>
                <li><a href="majice.html" style="color: inherit; text-decoration: none;">Majice i džemperi</a></li>
                <li>Pantalone i farmerke</li>
                <li>Suknje i šorcevi</li>
                <li>Jakne i kaputi</li>
                <li>Kompleti</li>
            </ul>
        </div>
        <div class="pretraga-okvir">
            <input type="text" class="form-control rounded-pill" placeholder="Pretraži">
        </div>
    </div>

    <div class="container">
        <h2 class="korpa-naslov">Korpa</h2>

        <div class="row mt-4">
            <div class="col-md-3">
                <img src="s1.jpg" class="proizvod-korpa-slika">
            </div>
            <div class="col-md-9 info-korpa">
                <h5>Dukserica oversize kroja</h5>
                <div class="cena-korpa">3499RSD</div>
                
                <p class="mb-1">veličina:</p>
                <p>M</p>

                <div class="kolicina-kontrola">
                    <button class="btn-kolicina">-</button>
                    <div class="kolicina-broj">1</div>
                    <button class="btn-kolicina">+</button>
                </div>
            </div>
        </div>
    </div>

    <div class="placanje-sekcija mt-auto">
        <div class="container">
            <div class="ukupno-tekst">Ukupno: 3499rsd</div>
            <a href="placanje.html" class="btn-placanje">nastavi na plaćanje</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
