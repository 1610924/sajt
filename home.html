<!doctype html>
<html lang="sr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AVENIR - Home</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-image: url('1.avif'); 
            background-size: cover;
            background-position: center 0; 
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #1a1a1a;
            margin: 0;
            color: white;
        }

        .navbar {
            background-color: white !important;
            height: 120px;
        }

        .offcanvas {
            width: 350px !important;
            background-color: rgba(242, 242, 242, 0.9) !important;
            color: black;
        }

        .naslov-kolekcija {
            font-family: serif;
            font-size: 60px; /* Fiksna veličina koju možeš lako da menjaš */
            margin-top: 100px;
            margin-bottom: 50px;
            text-align: center;
            text-shadow: 2px 2px 5px gray;
        }

        .proizvod-okvir {
            background-color: white;
            width: 200px;
            height: 200px;
            margin: 0 auto;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .proizvod-okvir img {
            max-width: 180px; /* Da slika ne udari u ivice kvadrata */
            max-height: 180px;
        }

        .pretraga-okvir {
            padding: 20px;
        }
		a{
		color: black;

		}
    </style>
</head>
<body>

    <nav class="navbar sticky-top border-bottom">
        <div class="container-fluid">
            <button class="btn btn-outline-dark" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasScrolling">
                meni
            </button>

            <a href="#" class="navbar-brand mx-auto">
                <img src="avenir.png" alt="Logo" height="100">
            </a>

            <div class="d-flex">
                <img src="omilj.png" width="30" class="me-2">
                <img src="korpica.png" width="30" class="me-2">
                <img src="user.png" width="30">
            </div>
        </div>
    </nav>

    <div class="offcanvas offcanvas-start" data-bs-scroll="true" data-bs-backdrop="false" id="offcanvasScrolling">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title">MENI</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <h3>Žene</h3>
            <h3 class="text-secondary">Muškarci</h3>
            <br>
            <p><strong>Odeća</strong></p>
            <ul class="list-unstyled ms-3 text-secondary">
                <li>Haljine i kombinezoni</li>
                <a href="majice.html"><li>Majice i džemperi</li></a>
                <li>Pantalone i farmerke</li>
                <li>Suknje i šorcevi</li>
                <li>Jakne i kaputi</li>
                <li>Kompleti</li>
            </ul>
        </div>
        <div class="pretraga-okvir">
            <input type="text" class="form-control rounded-pill" placeholder="Pretraži">
        </div>
    </div>

    <div class="container">
        
        <h1 class="naslov-kolekcija">• NOVA KOLEKCIJA •</h1>

        <div class="row g-4">
            
            <div class="col-6 col-md-3">
                <div class="proizvod-okvir">
                    <img src="11.jpg" alt="Odeća 1">
                </div>
            </div>

            <div class="col-6 col-md-3">
                <div class="proizvod-okvir">
                    <img src="12.jpg" alt="Odeća 2">
                </div>
            </div>

            <div class="col-6 col-md-3">
                <div class="proizvod-okvir">
                    <img src="13.jpg" alt="Odeća 3">
                </div>
            </div>

            <div class="col-6 col-md-3">
                <div class="proizvod-okvir">
                    <img src="5.avif" alt="Odeća 4">
                </div>
            </div>

        </div> </div> <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
