<!doctype html>
<html lang="sr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AVENIR - Plaćanje</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
             background: linear-gradient(to bottom, #EBD3CF 0%, #ffffff 50%);
            height: 100vh;
            margin: 0;
            font-family: helvetica, sans-serif;
        }

        .navbar {
            background-color: white !important;
            height: 120px;
        }

        .offcanvas {
            width: 350px !important;
            background-color: rgba(242, 242, 242, 0.9) !important;
            color: black;
        }

        .pretraga-okvir {
            padding: 20px;
        }

        .placanje-sekcija {
            background: linear-gradient(to bottom, #e8d1cf, white);
            padding-top: 40px;
            padding-bottom: 60px;
            min-height: 80vh;
        }

        .placanje-naslov {
            font-size: 28px;
            color: white;
            margin-bottom: 30px;
        }

        .form-label {
            margin-bottom: 5px;
            margin-left: 15px;
        }

        .custom-input {
            border-radius: 20px;
            border: none;
            padding: 12px 20px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 500px;
        }

        .checkbox-grupa {
            margin-top: 20px;
            margin-left: 40px;
        }

        .form-check-input {
            border: 1px solid #777;
            border-radius: 0;
        }

        .form-check-label {
            font-size: 18px;
        }

        .dugme-okvir {
            margin-top: 100px;
        }

        .btn-zavrsi {
            background-color: #f2d7d5;
            color: black;
            border: none;
            padding: 10px 100px;
            border-radius: 25px;
            text-decoration: none;
            display: inline-block;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <nav class="navbar sticky-top border-bottom">
        <div class="container-fluid">
            <button class="btn btn-outline-dark" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasScrolling">
                meni
            </button>
            <a href="index.html" class="navbar-brand mx-auto">
                <img src="avenir.png" alt="Logo" height="100">
            </a>
            <div class="d-flex">
                <img src="omilj.png" width="30" class="me-2">
                <img src="korpica.png" width="30" class="me-2">
                <img src="user.png" width="30">
            </div>
        </div>
    </nav>

    <div class="offcanvas offcanvas-start" data-bs-scroll="true" data-bs-backdrop="false" id="offcanvasScrolling">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title">MENI</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <h3>Žene</h3>
            <h3 class="text-secondary">Muškarci</h3>
            <br>
            <p><strong>Odeća</strong></p>
            <ul class="list-unstyled ms-3 text-secondary">
                <li>Haljine i kombinezoni</li>
                <li><a href="majice.html" style="color: inherit; text-decoration: none;">Majice i džemperi</a></li>
                <li>Pantalone i farmerke</li>
                <li>Suknje i šorcevi</li>
                <li>Jakne i kaputi</li>
                <li>Kompleti</li>
            </ul>
        </div>
        <div class="pretraga-okvir">
            <input type="text" class="form-control rounded-pill" placeholder="Pretraži">
        </div>
    </div>
        <div class="container">
            <h2 class="placanje-naslov">Plaćanje</h2>

            <div class="row">
                <div class="col-md-6">
                    <label class="form-label">Ime i prezime</label>
                    <input type="text" class="custom-input form-control">

                    <label class="form-label">Adresa</label>
                    <input type="text" class="custom-input form-control">

                    <div class="checkbox-grupa">
                        <div class="form-check">
                          <input class="form-check-input" type="checkbox" value="" id="pouzecem">
                          <label class="form-check-label" for="pouzecem">
                            Plaćanje pouzećem
                          </label>
                        </div>
                        <div class="form-check">
                          <input class="form-check-input" type="checkbox" value="" id="karticom">
                          <label class="form-check-label" for="karticom">
                            Plaćanje karticom
                          </label>
                        </div>
                    </div>

                    <div class="dugme-okvir">
                        <a href="uspeh.html" class="btn-zavrsi">završi</a>
                    </div>
                </div>
            </div>
        </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
